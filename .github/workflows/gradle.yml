name: Java CI with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Check JAR file
        run: |
          ls -la ./artifacts/
          file ./artifacts/app-card-delivery.jar
          unzip -t ./artifacts/app-card-delivery.jar | head -10

      - name: Start SUT
        run: |
          java -jar ./artifacts/app-card-delivery.jar &
          sleep 10
          curl -v http://localhost:9999 || echo "SUT not responding"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test with Gradle
        run: ./gradlew test --info -Dselenide.headless=true
